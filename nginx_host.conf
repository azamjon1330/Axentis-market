# ============================================================================
# HOST MACHINE NGINX CONFIG for axentis.uz
# ============================================================================
# Этот файл устанавливается на СЕРВЕРЕ (не в Docker), в /etc/nginx/sites-available/axentis.uz
# Затем: sudo ln -s /etc/nginx/sites-available/axentis.uz /etc/nginx/sites-enabled/axentis.uz
#
# SSL сертификаты получить через:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d axentis.uz -d www.axentis.uz
# ============================================================================

# Редирект HTTP → HTTPS
server {
    listen 80;
    server_name axentis.uz www.axentis.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Основной HTTPS сервер
server {
    listen 443 ssl http2;
    server_name axentis.uz www.axentis.uz;

    # SSL — сертификаты от certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/axentis.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/axentis.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # Frontend (Docker nginx на порту 5173)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (Docker backend на порту 3000)
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 20M;
        proxy_request_buffering off;
    }

    # Uploads / изображения товаров
    location /uploads {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Socket.io WebSocket
    location /socket.io {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
