version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: axentis-market-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: onlineshop2_user
      POSTGRES_PASSWORD: your_secure_password_here
      POSTGRES_DB: onlineshop2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - axentis-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: axentis-market-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - axentis-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: ""
    container_name: axentis-market-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - axentis-network

volumes:
  postgres_data:
  certbot_webroot:

networks:
  axentis-network:
    driver: bridge
