services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: onlineshop2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: onlineshop2
      POSTGRES_USER: onlineshop2_user
      POSTGRES_PASSWORD: your_secure_password_here
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onlineshop2_user -d onlineshop2"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onlineshop2-network

  # Backend API (Golang)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: onlineshop2-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      GIN_MODE: release
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: onlineshop2_user
      DB_PASSWORD: your_secure_password_here
      DB_NAME: onlineshop2
      DB_SSLMODE: disable
      JWT_SECRET: your_very_strong_jwt_secret_key_here_change_in_production
      JWT_EXPIRATION: 168h
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://192.168.1.5:3000,http://109.123.253.238:5173,http://109.123.253.238:3000,http://109.123.253.238
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - onlineshop2-network

  # Frontend (Vite)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: onlineshop2-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - onlineshop2-network

networks:
  onlineshop2-network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
