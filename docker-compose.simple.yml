version: '3.8'

services:
  # ============================================================================
  # PostgreSQL Database ONLY (simplified for local development)
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: azaton-postgres-simple
    restart: unless-stopped
    environment:
      POSTGRES_DB: azaton
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d azaton"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    driver: local
